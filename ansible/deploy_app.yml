---
# CivicDAO Ansible Playbook 2 — Deploy Application
# Usage: ansible-playbook -i inventory.yml ansible/deploy_app.yml

- name: Deploy CivicDAO Application
  hosts: civicdao_servers
  become: yes

  vars:
    app_user: civicdao
    app_dir: /opt/civicdao
    git_repo: https://github.com/Romi237/civicdao.git
    git_branch: main

  tasks:

    - name: Clone or update repository
      git:
        repo: "{{ git_repo }}"
        dest: "{{ app_dir }}/app"
        version: "{{ git_branch }}"
        force: yes
      become_user: "{{ app_user }}"

    - name: Copy backend .env to server
      template:
        src: templates/backend.env.j2
        dest: "{{ app_dir }}/app/backend/.env"
        owner: "{{ app_user }}"
        mode: '0600'

    - name: Deploy with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}/app"
        pull: always
        state: present
      become_user: "{{ app_user }}"

    - name: Wait for backend health check
      uri:
        url: http://localhost:3000/health
        method: GET
        status_code: 200
      register: health
      retries: 12
      delay: 10
      until: health.status == 200

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded

    - name: Remove unused Docker images
      community.docker.docker_prune:
        images: yes
        images_filters:
          dangling: true

    - name: Done
      debug:
        msg: "CivicDAO deployed. Health status: {{ health.status }}"