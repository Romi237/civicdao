apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: civicdao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: civicdao_new-backend:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 3000

        env:
        - name: PORT
          value: "3000"

        - name: MONGODB_URI
          value: "mongodb://mongodb:27017/civicdao"

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 20