# CivicDAO Kubernetes Deployment All-in-One
# Apply with: kubectl apply -f deploy-all.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: civicdao
---
apiVersion: v1
kind: Secret
metadata:
  name: civicdao-secrets
  namespace: civicdao
type: Opaque
stringData:
  JWT_SECRET: "your-jwt-secret-here-change-this-in-production"
  JWT_REFRESH_SECRET: "your-jwt-refresh-secret-here-change-this-in-production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: civicdao
data:
  default.conf: |
    upstream backend {
      server backend:3000;
    }

    server {
      listen 80;
      server_name _;

      location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
      }

      location /metrics {
        proxy_pass http://backend/metrics;
        proxy_set_header Host $host;
      }

      location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
      }

      location / {
        return 200 '{"app":"CivicDAO","status":"running"}';
        add_header Content-Type application/json;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: civicdao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: civicdao
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: civicdao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: civicdao_new-backend:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 3000

        env:
        - name: PORT
          value: "3000"

        - name: MONGODB_URI
          value: "mongodb://mongodb:27017/civicdao"

        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: civicdao-secrets
              key: JWT_SECRET

        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: civicdao-secrets
              key: JWT_REFRESH_SECRET

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: civicdao

spec:
  selector:
    app: backend

  ports:
  - port: 3000
    targetPort: 3000

  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: civicdao
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: civicdao

spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine

        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"

        ports:
        - containerPort: 80

        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf

      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: civicdao

spec:
  selector:
    app: nginx

  ports:
  - port: 80
    targetPort: 80

  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: civicdao-ingress
  namespace: civicdao
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: api.civicdao.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 80
