apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: civicdao

data:
  default.conf: |
    server {
      listen 80;

      location / {
        return 200 "CivicDAO NGINX is running\n";
      }

      location /api/ {
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://backend:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
    }