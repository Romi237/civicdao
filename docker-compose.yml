# CivicDAO — docker-compose.yml
# Start everything with: docker-compose up -d

version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: civicdao-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-changeme123}
      MONGO_INITDB_DATABASE: civicdao
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - civicdao
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civicdao-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-changeme123}@mongodb:27017/civicdao?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      BCRYPT_SALT_ROUNDS: 12
      JWT_EXPIRY: 1h
      REFRESH_TOKEN_EXPIRY: 7d
      CORS_ORIGIN: "*"
    ports:
      - "3002:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - civicdao
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: civicdao-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - civicdao

  grafana:
    image: grafana/grafana:10.3.3
    container_name: civicdao-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - civicdao

  node-exporter:
    image: prom/node-exporter:latest
    container_name: civicdao-node-exporter
    restart: unless-stopped
    ports:
    - "9100:9100"
    networks:
    - civicdao      

networks:
  civicdao:
    driver: bridge

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data: